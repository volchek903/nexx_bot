services:
  backend-api:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"

  backend-bot:
    build: ./backend
    command: python -m bot.main
    env_file:
      - .env
    environment:
      APP_ENV: production
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data
    depends_on:
      backend-api:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file:
      - .env
    environment:
      APP_ENV: production
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend-api:
        condition: service_healthy
