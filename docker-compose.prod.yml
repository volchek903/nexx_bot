services:
  backend-api:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"

  backend-bot:
    build: ./backend
    command: python -m bot.main
    env_file:
      - .env
    environment:
      APP_ENV: production
    restart: unless-stopped
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - backend-api

  frontend:
    build: ./frontend
    command: sh -c "npm run build && HOSTNAME=0.0.0.0 PORT=3000 node .next/standalone/server.js"
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend-api
