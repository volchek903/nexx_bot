services:
  backend-api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    environment:
      APP_ENV: production
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"

  backend-bot:
    build: ./backend
    command: python -m bot.main
    env_file:
      - .env
    environment:
      APP_ENV: production
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - backend-api

  frontend:
    build: ./frontend
    command: sh -c "npm run build && npm run start"
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend-api
