services:
  backend-api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"

  backend-bot:
    build: ./backend
    command: python -m bot.main
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - backend-api

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev
    env_file:
      - .env
    ports:
      - "2023:3000"
    depends_on:
      - backend-api
